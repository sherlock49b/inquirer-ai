[tool.uv.workspace]
members = ["python"]

[tool.commitizen]
name = "teamcz"
version = "0.3.1"
version_files = [
    "python/pyproject.toml:version",
    "go/prompt/version.go:Version",
    "typescript/package.json:version",
    "rust/Cargo.toml:version",
    "README.md:\"version\"",
    "spec/protocol.md:\"version\"",
    "spec/socket-transport.md:\"version\"",
]
# Umbrella release tags are vX.Y.Z. The `go/vX.Y.Z` tags (e.g. `go/v0.2.1`) are
# NOT stray: Go resolves the subdirectory module
# `github.com/sherlock49b/inquirer-ai/go` via `go/vX.Y.Z` tags, so they are
# required for `go get` and must NOT be deleted. cz only manages the v$version
# tags below; its "tag does not match format" notice for go/* tags is cosmetic.
tag_format = "v$version"
update_changelog_on_bump = true
changelog_file = "CHANGELOG.md"
