[tool.uv.workspace]
members = ["python"]

[tool.commitizen]
name = "teamcz"
version = "0.2.1"
version_files = [
    "python/pyproject.toml:version",
    "go/prompt/version.go:Version",
    "typescript/package.json:version",
    "rust/Cargo.toml:version",
]
tag_format = "v$version"
update_changelog_on_bump = true
changelog_file = "CHANGELOG.md"
