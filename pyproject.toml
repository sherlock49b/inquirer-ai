[tool.uv.workspace]
members = ["python"]

[tool.commitizen]
name = "teamcz"
version = "0.3.1"
version_files = [
    "python/pyproject.toml:version",
    "go/prompt/version.go:Version",
    "typescript/package.json:version",
    "rust/Cargo.toml:version",
    "README.md:\"version\"",
    "spec/protocol.md:\"version\"",
    "spec/socket-transport.md:\"version\"",
]
# Release tags are vX.Y.Z. A stray `go/v0.2.1` tag exists in history and does
# NOT match this format; a maintainer should delete it from the remote
# (`git push origin :go/v0.2.1`). Do not automate remote tag deletion.
tag_format = "v$version"
update_changelog_on_bump = true
changelog_file = "CHANGELOG.md"
