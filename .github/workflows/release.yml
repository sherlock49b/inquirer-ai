name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  auto-bump:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Override teamcz plugin (not installed in CI) with standard conventional commits
          sed -i 's/^name = "teamcz"/name = "cz_conventional_commits"/' pyproject.toml
          if cz bump --yes --changelog 2>&1 | tee /tmp/bump.log; then
            VERSION=$(grep '^version' python/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            git push --follow-tags
          else
            echo "No version bump needed (no feat/fix/breaking commits since last tag)"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-bump.outputs.version || github.ref_name }}
          body: ${{ steps.changelog.outputs.content }}

  publish-pypi:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - uses: astral-sh/setup-uv@v6

      - name: Build
        run: uv build --out-dir dist/

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tsc

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
