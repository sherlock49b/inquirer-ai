name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-bump:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install commitizen with the in-repo teamcz plugin
        # The plugin drives bumps from feat/fix/protocol/compat commits.
        run: uv tool install commitizen --with ./python --with ./extensions/cz-teamcz

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Run cz bump (uses [tool.commitizen] name = "teamcz" from pyproject.toml).
          # --no-verify so the generated "bump:" commit is not blocked by hooks.
          set +e
          cz bump --yes --changelog --no-verify 2>&1 | tee /tmp/bump.log
          rc=${PIPESTATUS[0]}
          set -e

          if [ "$rc" -eq 0 ]; then
            VERSION=$(grep '^version' python/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

            # Keep rust/Cargo.lock in sync with the new crate version and fold it
            # into the bump commit so the lockfile and tag stay consistent.
            ( cd rust && cargo update -p inquirer-ai --precise "${VERSION}" )
            if ! git diff --quiet -- rust/Cargo.lock; then
              git add rust/Cargo.lock
              git commit --amend --no-edit --no-verify
              # Re-point the tag at the amended commit.
              git tag -f "v${VERSION}"
            fi

            # Push the branch and tag FIRST; only set outputs once both succeed.
            git push origin "HEAD:${GITHUB_REF_NAME}"
            git push origin "v${VERSION}"

            echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 21 ]; then
            # Exit code 21 == NoneIncrementExit: no feat/fix/protocol/compat/
            # breaking commits since the last tag. Not an error.
            echo "No version bump needed (nothing to bump since last tag)"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "cz bump failed with exit code ${rc}" >&2
            exit "$rc"
          fi

  release:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-bump.outputs.version || github.ref_name }}
          body: ${{ steps.changelog.outputs.content }}

  publish-pypi:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - uses: astral-sh/setup-uv@v6

      - name: Build
        run: uv build --out-dir dist/

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tsc

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    needs: [auto-bump]
    if: always() && (needs.auto-bump.outputs.bumped == 'true' || (needs.auto-bump.result == 'skipped' && github.ref_type == 'tag'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-bump.outputs.version || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
